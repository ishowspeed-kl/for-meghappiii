<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Meghappiii</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Cinzel:wght@500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #04040d !important;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(138, 26, 77, 0.35) 0%, rgba(4, 4, 13, 0.99) 85%);
            z-index: 1;
        }

        /* Cinematic Frame Container */
        .main-frame {
            position: relative;
            width: 90%;
            height: 85%;
            max-width: 500px; /* Tailored perfectly for mobile screens */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border: 1px solid rgba(255, 0, 110, 0.15);
            background: rgba(4, 4, 13, 0.75);
            backdrop-filter: blur(8px);
            padding: 30px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .corner-line {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #ff006e;
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.6);
        }
        .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .symbol-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.15) 0%, transparent 70%);
        }

        .heart-core {
            position: absolute;
            font-size: 2.8rem;
            color: #ff006e;
            text-shadow: 0 0 20px #ff006e;
            animation: heartbeat 1.2s infinite ease-in-out;
        }

        @keyframes heartbeat {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 15px #ff006e); }
            100% { transform: scale(0.9); }
        }

        .main-heading {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: lowercase;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 25px;
        }

        /* Prank Interactive Button Matrix */
        .button-box {
            position: relative;
            width: 100%;
            height: 120px;
            margin-top: 10px;
        }

        .prank-btn {
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s ease;
            position: absolute;
        }

        #yesBtn {
            background: #ff006e;
            color: white;
            border: none;
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
            left: 10%;
            top: 20px;
            z-index: 100;
        }

        #noBtn {
            background: transparent;
            color: #80536c;
            border: 1px solid rgba(255, 0, 110, 0.3);
            right: 10%;
            top: 20px;
            z-index: 101;
            /* Explicitly absolute for instant mobile teleportation positioning */
        }

        #glowCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="background-interface"></div>
    <canvas id="glowCanvas"></canvas>

    <div class="main-frame">
        <div class="corner-line tl"></div>
        <div class="corner-line tr"></div>
        <div class="corner-line bl"></div>
        <div class="corner-line br"></div>

        <div class="hero-content">
            <div class="symbol-container">
                <div style="width: 100px; height: 100px; border: 1px dashed rgba(255, 0, 110, 0.4); border-radius: 50%; animation: spin 25s linear infinite;"></div>
                <div class="heart-core">❤</div>
            </div>
            
            <h1 class="main-heading">Are you the most beautiful girlfriend in the entire world?</h1>
            
            <div class="button-box">
                <button id="yesBtn" class="prank-btn" onclick="startPrankLoop()">YES</button>
                <button id="noBtn" class="prank-btn" ontouchstart="teleportButton(event)" onclick="teleportButton(event)">NO</button>
            </div>
        </div>
    </div>

    <script>
        // Teleportation Logic built uniquely to intercept mobile touch events instantly
        function teleportButton(e) {
            e.preventDefault(); // Blocks the touch click from registering
            const noBtn = document.getElementById('noBtn');
            const frame = document.querySelector('.main-frame');
            
            // Calculate boundaries relative to the frame wrapper container
            const maxWidth = frame.clientWidth - noBtn.clientWidth - 40;
            const maxHeight = frame.clientHeight - noBtn.clientHeight - 160;
            
            // Generate randomized dynamic layout parameters
            const randomX = Math.floor(Math.random() * maxWidth) + 20;
            const randomY = Math.floor(Math.random() * maxHeight) + 20;
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Infinite Text Alert Loop Payload Chain
        function startPrankLoop() {
            alert("System Validation Protocol: Initiated.");
            alert("Error 404: Too much cuteness detected on this device.");
            alert("Access Denied! You cannot close this page until you send your boyfriend 1000 kisses immediately. 💋");
            alert("Warning: Disobeying this alert will result in infinite tickles.");
            alert("Are you going to send them right now?");
            alert("Good girl! Verification complete. I love you! ❤️");
        }

        // Glow matrix interface backdrop setup
        const canvas = document.getElementById('glowCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        let mouse = { x: null, y: null };
        window.addEventListener('touchstart', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        function render() {
            ctx.clearRect(0, 0, width, height);
            if (mouse.x !== null) {
                ctx.save();
                let gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 150);
                gradient.addColorStop(0, 'rgba(255, 0, 110, 0.1)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
                ctx.restore();
            }
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
